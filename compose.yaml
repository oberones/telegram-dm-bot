name: dungeon-master-bot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dungeon_master_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - dm_bot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dungeon_master_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dungeon_master_bot
    command: ["npm", "run", "migrate", "--workspace", "@dm-bot/db"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dungeon_master_bot
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    depends_on:
      server:
        condition: service_healthy

volumes:
  dm_bot_postgres_data:
